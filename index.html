<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sistem ADN Tech</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f7fb;
    }

    .header {
      background: #0d47a1;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
    }

    .menu {
      display: flex;
      background: #1976d2;
    }

    .menu button {
      flex: 1;
      padding: 12px;
      border: none;
      background: #1976d2;
      color: white;
      cursor: pointer;
    }

    .menu button:hover {
      background: #0d47a1;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 100px);
      border: none;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>PORTAL SISTEM ADN TECH</h1>
</div>

<div class="menu">
  <button onclick="loadApp('murid')">Maklumat Murid</button>
</div>

<iframe id="appFrame" src=""></iframe>

<script>
  const apps = {
    murid: "https://script.google.com/macros/s/AKfycbw5hL_7gttDwU3aoA4X-xLNPUoV_G3b2lRI-NqRbezrn_SKCOiW2Le_fuQxOZk5c76x6Q/exec",
  };

  function loadApp(app) {
    document.getElementById("appFrame").src = apps[app];
  }
</script>

</body>
</html>
